# =============================================================================
# CyberShield — Docker Compose (Repository Foundation)
# =============================================================================
# Currently defines: backend API service
#
# Future additions (per module implementation):
#   - it-logs:     IT log generator container (Week 1)
#   - ot-logs:     OT Modbus simulator container (Week 1)
#   - postgres:    PostgreSQL database (staging/production)
#   - grafana:     Metrics dashboard (Week 4)
#   - prometheus:  Metrics scraper (Week 4)
#
# Usage:
#   docker compose -f docker/docker-compose.yml up           # dev mode
#   docker compose -f docker/docker-compose.yml up -d        # detached
#   docker compose -f docker/docker-compose.yml down         # stop
#   docker compose -f docker/docker-compose.yml logs -f api  # tail logs
# =============================================================================

name: cybershield

# ---------------------------------------------------------------------------
# Shared Network
# ---------------------------------------------------------------------------
networks:
  cybershield-net:
    driver: bridge
    name: cybershield-net

# ---------------------------------------------------------------------------
# Shared Volumes
# ---------------------------------------------------------------------------
volumes:
  cybershield-data:
    name: cybershield-data
  cybershield-models:
    name: cybershield-models
  cybershield-logs:
    name: cybershield-logs

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # -------------------------------------------------------------------------
  # Backend API — Development mode
  # -------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: cybershield-api
    image: cybershield:dev
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      # Mount source code for hot-reload
      - ..:/app
      # Persist data artifacts outside the container
      - cybershield-data:/app/data
      - cybershield-models:/app/models
    env_file:
      - ../.env
    environment:
      - APP_ENV=development
      - LOG_FORMAT=console
      - DATABASE_URL=sqlite+aiosqlite:///./data/cybershield.db
    networks:
      - cybershield-net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped

